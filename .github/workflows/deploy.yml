name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Verify email server (Ensend API)
        run: |
          node server/index.js &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:${PORT:-3001}/health || (kill $SERVER_PID 2>/dev/null; exit 1)
          kill $SERVER_PID 2>/dev/null || true
        env:
          PORT: 3001

      - name: Build site
        run: |
          if [ -z "${{ secrets.VITE_EMAIL_API_URL }}" ]; then
            echo "::warning::VITE_EMAIL_API_URL is not set. Emails on production will not work. Add it in repo Settings → Secrets → Actions."
          fi
          # App order: Groq → Gemini → OpenAI. At least one key is required for AI (market summary, Skill, Feed pulse, Compare).
          if [ -z "${{ secrets.VITE_GROQ_API_KEY }}" ] && [ -z "${{ secrets.VITE_GEMINI_API_KEY }}" ] && [ -z "${{ secrets.VITE_OPENAI_API_KEY }}" ]; then
            echo "::warning::No LLM keys set. Add VITE_GROQ_API_KEY (recommended) and/or VITE_GEMINI_API_KEY / VITE_OPENAI_API_KEY in Settings → Secrets → Actions — Vite bakes VITE_* in at build time."
          fi
          if [ -z "${{ secrets.VITE_GROQ_API_KEY }}" ]; then
            echo "::notice::VITE_GROQ_API_KEY is not set — production will use Gemini/OpenAI only if those secrets exist (https://console.groq.com)."
          fi
          if [ -z "${{ secrets.VITE_GEMINI_API_KEY }}" ]; then
            echo "::notice::VITE_GEMINI_API_KEY is not set — Gemini fallback unavailable unless you add it."
          fi
          if [ -z "${{ secrets.VITE_OPENAI_API_KEY }}" ]; then
            echo "::notice::VITE_OPENAI_API_KEY is not set — OpenAI last-resort fallback unavailable."
          fi
          npm run build
        env:
          API_KEY: ${{ secrets.API_KEY }}
          # Canonical public URL for WalletConnect / RainbowKit metadata (baked in at build time)
          VITE_APP_URL: https://inturank.intuition.box
          VITE_EMAIL_API_URL: ${{ secrets.VITE_EMAIL_API_URL }}
          VITE_GRAPHQL_URL: ${{ vars.VITE_GRAPHQL_URL }}
          VITE_MAINTENANCE_MODE: ${{ vars.VITE_MAINTENANCE_MODE || 'false' }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_GEMINI_MODEL: ${{ vars.VITE_GEMINI_MODEL }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_OPENAI_MODEL: ${{ vars.VITE_OPENAI_MODEL }}
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_GROQ_MODEL: ${{ vars.VITE_GROQ_MODEL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4