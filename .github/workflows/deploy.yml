name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Verify email server (Ensend API)
        run: |
          node server/index.js &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:${PORT:-3001}/health || (kill $SERVER_PID 2>/dev/null; exit 1)
          kill $SERVER_PID 2>/dev/null || true
        env:
          PORT: 3001

      - name: Build site
        run: |
          if [ -z "${{ secrets.VITE_EMAIL_API_URL }}" ]; then
            echo "::warning::VITE_EMAIL_API_URL is not set. Emails on production will not work. Add it in repo Settings → Secrets → Actions."
          fi
          if [ -z "${{ secrets.VITE_GEMINI_API_KEY }}" ]; then
            echo "::warning::VITE_GEMINI_API_KEY is not set. AI briefing/summary will not work. Add it in repo Settings → Secrets → Actions (single key or comma-separated: key1,key2,key3)."
          fi
          npm run build
        env:
          API_KEY: ${{ secrets.API_KEY }}
          VITE_EMAIL_API_URL: ${{ secrets.VITE_EMAIL_API_URL }}
          VITE_GRAPHQL_URL: ${{ vars.VITE_GRAPHQL_URL }}
          VITE_MAINTENANCE_MODE: ${{ vars.VITE_MAINTENANCE_MODE || 'false' }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4