    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              intuition: {
                dark: '#02040a', // Deepest arcade black
                card: '#0a0f1a',
                border: '#1f2937',
                primary: '#00f3ff', // Neon Cyan
                secondary: '#0066ff', // Electric Blue
                success: '#00ff9d', // Matrix Green
                danger: '#ff0055', // Arcade Red
                warning: '#facc15', // Pacman Yellow
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Fira Code', 'monospace'],
              display: ['Orbitron', 'sans-serif'],
            },
            animation: {
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glitch': 'glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite',
              'spin-slow': 'spin 12s linear infinite',
              'marquee': 'marquee 30s linear infinite',
            },
            keyframes: {
              glitch: {
                '0%': { transform: 'translate(0)' },
                '20%': { transform: 'translate(-2px, 2px)' },
                '40%': { transform: 'translate(-2px, -2px)' },
                '60%': { transform: 'translate(2px, 2px)' },
                '80%': { transform: 'translate(2px, -2px)' },
                '100%': { transform: 'translate(0)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;600&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #02040a;
        color: #e2e8f0;
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
      
      /* Typography Overrides */
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 0.05em;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #02040a;
      }
      ::-webkit-scrollbar-thumb {
        background: #1f2937;
        border: 1px solid #00f3ff;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00f3ff;
        box-shadow: 0 0 10px #00f3ff;
      }

      /* Arcade Effects */
      .scanlines {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(
          to bottom,
          rgba(255,255,255,0),
          rgba(255,255,255,0) 50%,
          rgba(0,0,0,0.2) 50%,
          rgba(0,0,0,0.2)
        );
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.15;
      }

      .retro-grid {
        background-size: 40px 40px;
        background-image:
          linear-gradient(to right, rgba(0, 243, 255, 0.05) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
      }

      .glass-panel {
        background: rgba(10, 15, 26, 0.7);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(0, 243, 255, 0.2);
        box-shadow: 0 0 15px rgba(0, 243, 255, 0.05);
      }

      /* GAMIFIED UTILITIES */
      
      /* Slanted Corners (Sci-Fi Look) */
      .clip-path-slant {
        clip-path: polygon(
          10px 0, 
          100% 0, 
          100% calc(100% - 10px), 
          calc(100% - 10px) 100%, 
          0 100%, 
          0 10px
        );
      }

      /* Intense Hover Glow - System Wide */
      .hover-glow {
        transition: all 0.3s ease;
      }
      .hover-glow:hover {
        box-shadow: 0 0 25px rgba(0, 243, 255, 0.5), inset 0 0 15px rgba(0, 243, 255, 0.2);
        border-color: #00f3ff;
        text-shadow: 0 0 8px rgba(0, 243, 255, 0.8);
        z-index: 10;
      }

      /* Text Glow Utilities */
      .text-glow {
        text-shadow: 0 0 10px rgba(0, 243, 255, 0.6), 0 0 20px rgba(0, 243, 255, 0.3);
      }
      .text-glow-success {
        text-shadow: 0 0 10px rgba(0, 255, 157, 0.6), 0 0 20px rgba(0, 255, 157, 0.3);
      }
      .text-glow-danger {
        text-shadow: 0 0 10px rgba(255, 0, 85, 0.6), 0 0 20px rgba(255, 0, 85, 0.3);
      }
      .text-glow-gold {
        text-shadow: 0 0 10px rgba(250, 204, 21, 0.6), 0 0 20px rgba(250, 204, 21, 0.3);
      }

      /* Box Glow Utilities */
      .box-glow {
        box-shadow: 0 0 20px rgba(0, 243, 255, 0.15), inset 0 0 20px rgba(0, 243, 255, 0.05);
      }
      .box-glow-hover:hover {
        box-shadow: 0 0 30px rgba(0, 243, 255, 0.3), inset 0 0 20px rgba(0, 243, 255, 0.1);
        border-color: #00f3ff;
      }

      /* Glitch Text Effect on Hover */
      .hover-glitch:hover {
        animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
        color: #00f3ff;
        text-shadow: 2px 0 #ff0055, -2px 0 #00ff9d;
      }

      /* Success/Danger Borders with Glow */
      .neon-border {
        border: 1px solid #00f3ff;
        box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
      }
      .neon-green-border {
        border: 1px solid #00ff9d;
        box-shadow: 0 0 15px rgba(0, 255, 157, 0.4);
      }
      .neon-red-border {
        border: 1px solid #ff0055;
        box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
      }

      /* --- CYBER BUTTONS --- */
      .btn-cyber {
        position: relative;
        text-transform: uppercase;
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        letter-spacing: 0.1em;
        border: none;
        cursor: pointer;
        clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Scanline sweep effect */
      .btn-cyber::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.5),
          transparent
        );
        transition: all 0.5s ease-in-out;
        z-index: 2;
        pointer-events: none;
      }

      .btn-cyber:hover::before {
        left: 100%;
      }

      .btn-cyber:hover {
        transform: translateY(-2px);
        letter-spacing: 0.15em;
      }

      /* Cyan Variant (Primary) */
      .btn-cyber-cyan {
        background: #00f3ff;
        color: #000;
        box-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
      }
      .btn-cyber-cyan:hover {
        background: #fff;
        color: #000;
        box-shadow: 0 0 30px rgba(0, 243, 255, 0.8);
      }

      /* Outline Variant (Secondary) */
      .btn-cyber-outline {
        background: rgba(0, 0, 0, 0.6);
        color: #00f3ff;
        border: 1px solid #00f3ff;
        box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.1);
      }
      .btn-cyber-outline:hover {
        background: rgba(0, 243, 255, 0.15);
        color: #fff;
        border-color: #fff;
        box-shadow: 0 0 20px rgba(0, 243, 255, 0.5), inset 0 0 20px rgba(0, 243, 255, 0.2);
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
      }

      /* White Variant (Special) */
      .btn-cyber-white {
        background: #fff;
        color: #000;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
      }
      .btn-cyber-white:hover {
        background: #00f3ff;
        color: #000;
        box-shadow: 0 0 40px rgba(0, 243, 255, 0.8);
      }

      /* Danger Variant */
      .btn-cyber-danger {
        background: rgba(255, 0, 85, 0.1);
        border: 1px solid #ff0055;
        color: #ff0055;
      }
      .btn-cyber-danger:hover {
        background: #ff0055;
        color: #000;
        box-shadow: 0 0 30px rgba(255, 0, 85, 0.6);
      }
      
      /* Success Variant */
      .btn-cyber-success {
        background: rgba(0, 255, 157, 0.1);
        border: 1px solid #00ff9d;
        color: #00ff9d;
      }
      .btn-cyber-success:hover {
        background: #00ff9d;
        color: #000;
        box-shadow: 0 0 30px rgba(0, 255, 157, 0.6);
      }
    </style>
