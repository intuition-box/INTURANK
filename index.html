    <style>
      /* Fluid system-wide animation: liquid, smooth easing */
      :root {
        --anim-ease: cubic-bezier(0.25, 0.1, 0.25, 1);
        --anim-ease-out: cubic-bezier(0.2, 0.85, 0.25, 1);
        --anim-ease-in-out: cubic-bezier(0.45, 0, 0.25, 1);
        --anim-duration-fast: 0.18s;
        --anim-duration-normal: 0.24s;
        --anim-duration-slow: 0.32s;
      }
      @media (max-width: 768px) {
        :root {
          --anim-duration-fast: 0.16s;
          --anim-duration-normal: 0.22s;
          --anim-duration-slow: 0.28s;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        :root {
          --anim-duration-fast: 0.01ms;
          --anim-duration-normal: 0.01ms;
          --anim-duration-slow: 0.01ms;
        }
      }

      /* overflow-x: clip avoids pairing overflow-y with auto (nested scrollbars next to body). */
      html { scroll-behavior: smooth; overflow-x: clip; }
      @media (prefers-reduced-motion: reduce) {
        html { scroll-behavior: auto; }
      }
      body {
        background-color: #020308;

        .mobile-break { word-break: break-word; overflow-wrap: break-word; }
      }

      /* Apple/Samsung-style scroll reveal: fluid, long duration */
      @keyframes scroll-reveal-up {
        from { opacity: 0; transform: translateY(32px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scroll-reveal-scale {
        from { opacity: 0; transform: scale(0.96); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-scroll-reveal-up {
        animation: scroll-reveal-up 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      .animate-scroll-reveal-scale {
        animation: scroll-reveal-scale 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      /* Legacy */

        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-in {

      }
      @keyframes scale-in {

        to { opacity: 1; transform: scale(1); }
      }

        100% { background-position: 200% 0; }
      }
      .animate-fade-in-up {
        animation: fade-in-up var(--anim-duration-slow) var(--anim-ease-out) forwards;
      }
      .animate-fade-in {
        animation: fade-in var(--anim-duration-normal) var(--anim-ease-out) forwards;
      }
      .animate-scale-in {
        animation: scale-in var(--anim-duration-fast) var(--anim-ease-out) forwards;
      }
      /* Notification panel: pop + slide */
      @keyframes notification-panel-in {
        from { opacity: 0; transform: translateY(-8px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .animate-notification-panel-in {
        animation: notification-panel-in var(--anim-duration-fast) var(--anim-ease-out) forwards;

      }
      /* Create Signal / step transitions: slide + fade */
      @keyframes slide-in-from-right-4 {
        from { opacity: 0; transform: translateX(1rem); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes slide-in-from-left-4 {

      .animate-in {

      }
      .slide-in-from-right-4 {

      }
      .slide-in-from-left-4 {

      /* Email notify modal: scale + fade in */
      @keyframes email-modal-in {
        from { opacity: 0; transform: scale(0.92) translateY(12px); }

      @keyframes arena-pulse {

      .atom-card {

          inset 0 1px 0 rgba(255,255,255,0.04);

      .atom-card::after {
        content: '';

        inset: 0;
        background: repeating-linear-gradient(

          transparent 0px,
          transparent 1px,
          rgba(255,255,255,0.015) 1px,
          rgba(255,255,255,0.015) 2px

        border-radius: inherit;

      /* Holographic foil border — rainbow accent (like premium Pokémon cards) */
      .atom-card-front::before {

        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);

      /* Artwork area — when IMAGE exists: subtle holographic overlay, images show clearly */

          #1e1a28 40%,

        border-bottom: 1px solid rgba(0,0,0,0.5);
